<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>계약서 보안 관리 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
            --border-color: #334155;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: var(--bg-color); color: var(--text-color); padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* 탭 메뉴 스타일 */
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; }
        .tab-btn { background: none; border: none; color: #94a3b8; font-size: 18px; font-weight: bold; padding: 10px 20px; cursor: pointer; }
        .tab-btn.active { color: var(--accent-color); border-bottom: 3px solid var(--accent-color); }
        .page-section { display: none; background: var(--panel-bg); padding: 30px; border-radius: 12px; border: 1px solid var(--border-color); }
        .page-section.active { display: block; }

        /* 로그인 폼 스타일 */
        #login-section { max-width: 400px; margin: 100px auto; background: var(--panel-bg); padding: 40px; border-radius: 12px; text-align: center; }
        
        /* 폼 공통 스타일 */
        .form-group { margin-bottom: 20px; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #cbd5e1; }
        input, select, textarea { width: 100%; padding: 10px; background: #0f172a; border: 1px solid var(--border-color); color: white; border-radius: 6px; }
        .doc-num-box { display: flex; gap: 10px; align-items: center; }
        
        button.btn-primary { background: var(--accent-color); color: #0f172a; font-weight: bold; padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; width: 100%; font-size: 16px; }
        
        /* 테이블 및 검색바 스타일 */
        .search-bar { display: flex; gap: 15px; margin-bottom: 20px; }
        .table-wrapper { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 12px; border-bottom: 1px solid var(--border-color); }
        th { background: #0f172a; color: var(--accent-color); }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: right; margin-bottom: 10px;">
        <button id="btn-logout" class="hidden" style="background: none; border: none; color: #ef4444; cursor: pointer;">[로그아웃]</button>
    </div>

    <div id="login-section">
        <h2 style="margin-bottom: 20px;">계약서 시스템 로그인</h2>
        <div class="form-group">
            <input type="email" id="login-email" placeholder="아이디(이메일)" required>
        </div>
        <div class="form-group">
            <input type="password" id="login-password" placeholder="비밀번호" required>
        </div>
        <button class="btn-primary" onclick="handleLogin()">인증 및 접속</button>
    </div>

    <div id="main-system" class="hidden">
        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('input')">계약서 등록 (입력)</button>
            <button class="tab-btn" onclick="switchTab('list')">계약서 목록 및 검색 (출력)</button>
        </div>

        <div id="section-input" class="page-section active">
            <form id="contract-form" onsubmit="saveContract(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label>문서번호 (3분할)</label>
                        <div class="doc-num-box">
                            <select id="doc_dept" required style="flex: 2;">
                                <option value="">부서 선택</option>
                                <option value="인사">인사</option>
                                <option value="총무">총무</option>
                                <option value="재경">재경</option>
                                <option value="법무">법무</option>
                                <option value="영업">영업</option>
                            </select>
                            <input type="number" id="doc_year" placeholder="연도(YYYY)" required style="flex: 2;">
                            <input type="number" id="doc_num" placeholder="번호" required style="flex: 1.5;">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>제목</label>
                        <input type="text" id="title" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>기안자</label>
                        <input type="text" id="drafter" required>
                    </div>
                    <div class="form-group">
                        <label>검토자</label>
                        <input type="text" id="reviewer" required>
                    </div>
                    <div class="form-group">
                        <label>최종결재자</label>
                        <input type="text" id="approver" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>날인일자</label>
                        <input type="date" id="sign_date" required>
                    </div>
                    <div class="form-group">
                        <label>날인번호</label>
                        <input type="text" id="sign_num" required>
                    </div>
                    <div class="form-group">
                        <label>계약유형</label>
                        <input type="text" id="contract_type" placeholder="예: 용역, 구매, 제휴" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group"><label>상대방 1</label><input type="text" id="party_1" required></div>
                    <div class="form-group"><label>상대방 2 (선택)</label><input type="text" id="party_2"></div>
                    <div class="form-group"><label>상대방 3 (선택)</label><input type="text" id="party_3"></div>
                </div>

                <div class="form-row">
                    <div class="form-group"><label>계약개시일자</label><input type="date" id="start_date" required></div>
                    <div class="form-group"><label>계약종료일자</label><input type="date" id="end_date" required></div>
                    <div class="form-group"><label>계약금액 (KRW)</label><input type="number" id="amount" placeholder="₩" required></div>
                </div>

                <div class="form-row">
                    <div class="form-group" style="display: flex; align-items: center; gap: 10px; margin-top: 30px;">
                        <input type="checkbox" id="auto_renew" style="width: 20px; height: 20px;" onchange="toggleNoticePeriod()">
                        <label for="auto_renew" style="margin: 0; cursor: pointer;">자동갱신 여부</label>
                    </div>
                    <div class="form-group hidden" id="notice-group">
                        <label>갱신 전 통보 기일 (일 수)</label>
                        <input type="number" id="notice_period" value="0">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group"><label>원본 날인자</label><input type="text" id="original_signer"></div>
                    <div class="form-group"><label>원본 보관자</label><input type="text" id="original_keeper"></div>
                    <div class="form-group"><label>사본 보관자</label><input type="text" id="copy_keeper"></div>
                </div>

                <div class="form-group" style="background: #0f172a; padding: 20px; border-radius: 6px;">
                    <label>계약서 사본 파일 첨부 (PDF / 이미지)</label>
                    <input type="file" id="contract_file" required>
                </div>

                <button type="submit" class="btn-primary" style="margin-top: 20px;">계약서 정보 시스템 등록</button>
            </form>
        </div>

        <div id="section-list" class="page-section">
            <div class="search-bar">
                <input type="text" id="search-keyword" placeholder="제목, 상대방, 기안자 통합 키워드 검색..." style="flex: 4;">
                <button class="btn-primary" style="flex: 1;" onclick="loadContracts()">검색</button>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>문서번호</th>
                            <th>제목</th>
                            <th>계약유형</th>
                            <th>상대방</th>
                            <th>계약기간</th>
                            <th>계약금액</th>
                            <th>기안/검토/결재</th>
                            <th>날인 정보</th>
                            <th>갱신조건</th>
                            <th>보관(원/사)</th>
                            <th>파일</th>
                        </tr>
                    </thead>
                    <tbody id="contract-table-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // ⚠️ 본인의 Supabase Project URL 및 API Key(Anon Key) 정보 입력
    const SUPABASE_URL = "https://dqdcoisbtqbkytzvyfct.supabase.co";
    const SUPABASE_KEY = "sb_publishable_iAeHQcv6_WxXqQvZ3FLWWg_7xN66R6O";
    
    // 글로벌 윈도우 객체에서 안전하게 라이브러리 인스턴스 생성
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 페이지 로드 시 세션 확인
    window.addEventListener('DOMContentLoaded', async () => {
        const { data: { session }, error } = await supabase.auth.getSession();
        if (session) {
            showSystem();
        }
    });

    // 탭 전환
    function switchTab(type) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
        
        if (type === 'input') {
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
            document.getElementById('section-input').classList.add('active');
        } else {
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            document.getElementById('section-list').classList.add('active');
            loadContracts();
        }
    }

    // 로그인
    async function handleLogin() {
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;

        if(!email || !password) return alert("아이디와 비밀번호를 모두 입력해주세요.");

        const { data, error } = await supabase.auth.signInWithPassword({ email, password });

        if (error) {
            alert("인증 오류: " + error.message);
        } else {
            showSystem();
        }
    }

    // 로그아웃
    document.getElementById('btn-logout').onclick = async () => {
        await supabase.auth.signOut();
        location.reload();
    };

    function showSystem() {
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('main-system').classList.remove('hidden');
        document.getElementById('btn-logout').classList.remove('hidden');
    }

    // 조건부 UI 연동
    function toggleNoticePeriod() {
        const isChecked = document.getElementById('auto_renew').checked;
        const group = document.getElementById('notice-group');
        if (isChecked) group.classList.remove('hidden');
        else group.classList.add('hidden');
    }

    // 데이터 저장 (Storage 업로드 -> DB Insert)
    async function saveContract(e) {
        e.preventDefault();
        
        const fileInput = document.getElementById('contract_file');
        const file = fileInput.files[0];
        if (!file) return alert("사본 파일을 첨부해 주세요.");

        const fileExt = file.name.split('.').pop();
        const fileName = `${Date.now()}.${fileExt}`;
        const filePath = `contracts/${fileName}`;

        const { data: storageData, error: storageError } = await supabase.storage
            .from('contract-files')
            .upload(filePath, file);

        if (storageError) return alert("파일 업로드 오류: " + storageError.message);

        const { data: { publicUrl } } = supabase.storage.from('contract-files').getPublicUrl(filePath);

        const contractData = {
            doc_dept: document.getElementById('doc_dept').value,
            doc_year: parseInt(document.getElementById('doc_year').value),
            doc_num: parseInt(document.getElementById('doc_num').value),
            title: document.getElementById('title').value,
            drafter: document.getElementById('drafter').value,
            reviewer: document.getElementById('reviewer').value,
            approver: document.getElementById('approver').value,
            sign_date: document.getElementById('sign_date').value,
            sign_num: document.getElementById('sign_num').value,
            contract_type: document.getElementById('contract_type').value,
            party_1: document.getElementById('party_1').value,
            party_2: document.getElementById('party_2').value || null,
            party_3: document.getElementById('party_3').value || null,
            start_date: document.getElementById('start_date').value,
            end_date: document.getElementById('end_date').value,
            auto_renew: document.getElementById('auto_renew').checked,
            notice_period: parseInt(document.getElementById('notice_period').value) || 0,
            amount: parseFloat(document.getElementById('amount').value) || 0,
            original_signer: document.getElementById('original_signer').value || null,
            original_keeper: document.getElementById('original_keeper').value || null,
            copy_keeper: document.getElementById('copy_keeper').value || null,
            file_url: publicUrl
        };

        const { error: dbError } = await supabase.from('contracts').insert([contractData]);

        if (dbError) {
            alert("DB 저장 오류 (문서번호 중복 등 확인): " + dbError.message);
        } else {
            alert("계약서가 성공적으로 등록되었습니다.");
            document.getElementById('contract-form').reset();
            switchTab('list');
        }
    }

    // 데이터 출력 및 통합 검색
    async function loadContracts() {
        const keyword = document.getElementById('search-keyword').value;
        let query = supabase.from('contracts').select('*');

        if (keyword) {
            query = query.or(`title.ilike.%${keyword}%,party_1.ilike.%${keyword}%,drafter.ilike.%${keyword}%`);
        }

        const { data, error } = await query.order('created_at', { ascending: false });

        if (error) return alert("데이터 로딩 오류: " + error.message);

        const tbody = document.getElementById('contract-table-body');
        tbody.innerHTML = "";

        data.forEach(item => {
            const parties = [item.party_1, item.party_2, item.party_3].filter(Boolean).join(', ');
            const formattedAmount = new Intl.NumberFormat('ko-KR', { style: 'currency', currency: 'KRW' }).format(item.amount);
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><b>${item.doc_dept}-${item.doc_year}-${item.doc_num}</b></td>
                <td>${item.title}</td>
                <td><span style="background:#475569; padding:2px 6px; border-radius:4px; font-size:12px;">${item.contract_type}</span></td>
                <td>${parties}</td>
                <td><small>${item.start_date} ~ ${item.end_date}</small></td>
                <td>${formattedAmount}</td>
                <td><small>${item.drafter} / ${item.reviewer} / ${item.approver}</small></td>
                <td><small>${item.sign_date} (${item.sign_num})</small></td>
                <td>${item.auto_renew ? `자동갱신 (${item.notice_period}일전 통보)` : '단발성'}</td>
                <td><small>원: ${item.original_keeper || '-'}<br>사: ${item.copy_keeper || '-'}</small></td>
                <td><a href="${item.file_url}" target="_blank" style="color:var(--accent-color); text-decoration:none;">💾 보기</a></td>
            `;
            tbody.appendChild(tr);
        });
    }
</script>
</body>
</html>
